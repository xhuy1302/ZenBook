spring:
  application:
    name: ZenBook

  datasource:
    url: jdbc:mysql://localhost:3306/zenbook_store_db
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

#  servlet:
#    multipart:
#      max-file-size: 5MB
#      max-request-size: 5MB

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
#    drop-first: true

