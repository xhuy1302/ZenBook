spring:
  application:
    name: ZenBook
  ai:
    openai:
      base-url: http://127.0.0.1:20128
      api-key: sk-94fdd5f593f1755d-1qubii-79470535
      client-type: rest_client
      chat:
        options:
          model: zenbook-chat

      # 👉 1. TẮT HOÀN TOÀN TÍNH NĂNG EMBEDDING CỦA OPENAI / 9ROUTER
      embedding:
        enabled: false

    retry:
      max-attempts: 3
      backoff:
        initial-interval: 1s

    vectorstore:
      redis:
        # 👉 2. BẮT BUỘC ĐỔI TÊN INDEX ĐỂ REDIS TẠO BẢNG MỚI
        index: zenbook-rag-local
        uri: "redis://localhost:6379"
        prefix: "zenbook-doc-local:"
        initialize-schema: true

  datasource:
    url: jdbc:mysql://localhost:3306/zenbook_store_db
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379
    cache:
      type: redis
      redis:
        time-to-live: 3600000 # Lưu cache trong 1 tiếng (tính bằng ms)
        cache-null-values: false

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 5MB
#    servlet:
#      multipart:
#        enabled: true
#        max-file-size: 10MB
#        max-request-size: 10MB

  jpa:
    database-platform: org.hibernate.dialect.MySQL8Dialect
    hibernate:
      ddl-auto: none
    show-sql: false
    properties:
      hibernate:
        format_sql: false

  liquibase:
    enabled: true
    change-log: classpath:db/changelog/db.changelog-master.xml
#    drop-first: true

